services:
  # Base de datos para GLPI
  db-glpi:
    image: mariadb:10.11
    container_name: glpi-db
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=root_pass
      - MARIADB_DATABASE=glpi_db
      - MARIADB_USER=glpi_user
      - MARIADB_PASSWORD=glpi_pass
    volumes:
      - ./mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M # Limitamos el consumo de RAM

  # Contenedor de GLPI
  glpi:
    image: glpi/glpi:latest # <--- AQUÍ ESTÁ LA CORRECCIÓN
    container_name: glpi-app
    restart: always
    depends_on:
      - db-glpi
    ports:
      - "8080:80" # Accederás vía http://localhost:8080
    environment:
      - GLPI_DB_HOST=db-glpi
      - GLPI_DB_NAME=glpi_db
      - GLPI_DB_USER=glpi_user
      - GLPI_DB_PASSWORD=glpi_pass
    volumes:
      - ./glpi_data:/var/www/html/glpi
    deploy:
      resources:
        limits:
          memory: 1G # Reservamos máximo 1GB para la aplicación

  # Mailpit para pruebas de correo
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: always
    ports:
      - "8025:8025" # Interfaz Web
      - "1025:1025" # Servidor SMTP
    deploy:
      resources:
        limits:
          memory: 128M
